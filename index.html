<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <style>
    /* All your existing Lucky Draw styles – keep them */
    /* (not repeated here for brevity) */
  </style>
</head>
<body>
  <!-- ... all your existing Lucky Draw HTML content ... -->
  <!-- ... (the same as in the previous Lucky Draw answer) ... -->

  <script>
    // All your existing Lucky Draw JavaScript (including all functions)
    // Only replace the printer integration part (the IIFE at the end) with the version below.

    // ---------- PRINTER INTEGRATION (with auto‑reconnect) ----------
    (function() {
      const connectBtn = document.getElementById('connectPrinterButton');
      const printerStatus = document.getElementById('printerStatus');
      let gattServer = null;
      let printerCharacteristic = null;
      let isConnected = false;
      let lastDeviceId = localStorage.getItem('lastLuckyDrawPrinterId');

      function formatDate(date) {
        const d = date.getDate().toString().padStart(2, '0');
        const m = (date.getMonth() + 1).toString().padStart(2, '0');
        const y = date.getFullYear();
        return `${d}/${m}/${y}`;
      }

      function generateReceiptData(prizeLabel, receiptNumber, spinDate = new Date()) {
        const encoder = new TextEncoder();
        const validFrom = new Date(spinDate.getFullYear(), spinDate.getMonth(), spinDate.getDate());
        const validTill = new Date(validFrom);
        validTill.setDate(validTill.getDate() + 30);
        const lines = [
          '',
          'LUCKY DRAW',
          'CONGRATULATIONS',
          'YOU ARE ENTITLED',
          '',
          `FREE ${prizeLabel}`,
          'WITH ANY PURCHASE',
          '(EXCEPT OPENING PROMOTION)',
          '',
          `VALID FROM ${formatDate(validFrom)}`,
          `TILL ${formatDate(validTill)}`,
          `Receipt No: ${receiptNumber}`,
          '',
          ''
        ];
        const text = lines.join('\n');
        const commands = [
          0x1B, 0x40,
          0x1B, 0x52, 0x00,
          0x1B, 0x21, 0x00,
          0x1B, 0x61, 0x01,
          ...encoder.encode(text),
          0x1B, 0x64, 0x03,
          0x1D, 0x56, 0x41, 0x00
        ];
        return new Uint8Array(commands);
      }

      async function printWinningPrize(prizeLabel, receiptNumber, spinDate) {
        if (!isConnected || !printerCharacteristic) {
          printerStatus.innerText = '❌ Printer not connected';
          return false;
        }
        try {
          const receipt = generateReceiptData(prizeLabel, receiptNumber, spinDate);
          await printerCharacteristic.writeValue(receipt);
          printerStatus.innerText = '✅ Receipt printed';
          return true;
        } catch (error) {
          console.error('Print error:', error);
          printerStatus.innerText = `❌ Print failed: ${error.message}`;
          return false;
        }
      }

      async function autoReconnect() {
        if (!lastDeviceId) return false;
        try {
          if (typeof navigator.bluetooth.getDevices === 'function') {
            const devices = await navigator.bluetooth.getDevices();
            const savedDevice = devices.find(dev => dev.id === lastDeviceId);
            if (savedDevice) {
              printerStatus.innerText = '🔌 Reconnecting to last printer...';
              gattServer = await savedDevice.gatt.connect();
              const services = await gattServer.getPrimaryServices();
              let foundChar = null;
              for (const service of services) {
                const chars = await service.getCharacteristics();
                for (const char of chars) {
                  if (char.properties.write || char.properties.writeWithoutResponse) {
                    foundChar = char;
                    break;
                  }
                }
                if (foundChar) break;
              }
              if (!foundChar) throw new Error('No writable characteristic');
              printerCharacteristic = foundChar;
              isConnected = true;
              window.printerAPI.isConnected = true;
              printerStatus.innerText = '✅ Printer ready (auto-reconnect)';
              connectBtn.innerText = '🖨️ disconnect';
              const spinBtn = document.getElementById('spinButton');
              if (spinBtn) spinBtn.style.display = 'flex';
              return true;
            }
          }
        } catch (err) {
          console.warn('Auto‑reconnect failed:', err);
        }
        return false;
      }

      async function connectPrinter() {
        try {
          setStatus('🔍 Requesting Bluetooth device...');
          connectBtn.disabled = true;
          const device = await navigator.bluetooth.requestDevice({
            acceptAllDevices: true,
            optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb']
          });
          // Save device ID
          localStorage.setItem('lastLuckyDrawPrinterId', device.id);
          lastDeviceId = device.id;
          setStatus(`✅ Device selected: ${device.name || 'Unnamed'}\nConnecting to GATT...`);
          gattServer = await device.gatt.connect();
          setStatus(`✅ GATT connected. Discovering services...`);
          const services = await gattServer.getPrimaryServices();
          let foundChar = null;
          for (const service of services) {
            const characteristics = await service.getCharacteristics();
            for (const char of characteristics) {
              if (char.properties.write || char.properties.writeWithoutResponse) {
                foundChar = char;
                break;
              }
            }
            if (foundChar) break;
          }
          if (!foundChar) throw new Error('No writable characteristic found');
          printerCharacteristic = foundChar;
          isConnected = true;
          window.printerAPI.isConnected = true;
          setStatus('✅ Printer ready!');
          connectBtn.innerText = '🖨️ disconnect';
          const spinBtn = document.getElementById('spinButton');
          if (spinBtn) spinBtn.style.display = 'flex';
        } catch (error) {
          console.error('Connection error:', error);
          setStatus(`❌ Failed: ${error.message}`, true);
          gattServer = null;
          printerCharacteristic = null;
        } finally {
          connectBtn.disabled = false;
        }
      }

      async function disconnectPrinter() {
        try {
          if (gattServer) {
            gattServer.disconnect();
            gattServer = null;
            printerCharacteristic = null;
          }
          isConnected = false;
          window.printerAPI.isConnected = false;
          setStatus('');
          connectBtn.innerText = '🖨️ connect printer';
          const spinBtn = document.getElementById('spinButton');
          if (spinBtn) spinBtn.style.display = 'none';
          spinBtn?.classList.remove('pulse-glow');
        } catch (error) {
          console.error('Disconnect error:', error);
          setStatus('❌ Disconnect failed', true);
        }
      }

      function setStatus(msg, isError = false) {
        printerStatus.innerText = msg;
        printerStatus.style.background = isError ? '#ffeeee' : '#f0f0f0';
      }

      connectBtn.addEventListener('click', () => {
        if (!isConnected) connectPrinter();
        else disconnectPrinter();
      });

      window.printerAPI = { isConnected: false, printWinningPrize: printWinningPrize };

      // Attempt auto‑reconnect on page load
      autoReconnect().then(success => {
        if (!success) {
          setStatus('⚪ Not connected. Click "connect printer" to pair.');
        }
      });
    })();
  </script>
</body>
</html>
