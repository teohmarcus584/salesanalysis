<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>UL LUCKY SPIN · 2D FLAT EDITION</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #1a2a1f, #0a0f0a);
      font-family: 'Segoe UI', 'Poppins', 'Roboto', system-ui, sans-serif;
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    .wheel-container {
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(2px);
      width: 100%;
      max-width: 100%;
      margin: 0;
      padding: 20px 16px 30px 16px;
      border-radius: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-size: clamp(1.8rem, 8vw, 2.6rem);
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #FFE6A3, #D4AF37);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 0 0 12px 0;
      text-align: center;
    }

    .wheel-wrapper {
      position: relative;
      display: flex;
      justify-content: center;
      margin: 10px 0 15px 0;
      width: 100%;
    }

    canvas {
      width: 100%;
      max-width: min(92vw, 92vh);
      height: auto;
      aspect-ratio: 1/1;
      display: block;
      border-radius: 50%;
      cursor: pointer;
      margin: 0 auto;
      background: #2c241a;
      box-shadow: none;
    }

    #spinButton {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #f5c542;
      border: 3px solid #b47c10;
      border-radius: 50%;
      width: min(115px, 22vw);
      height: min(115px, 22vw);
      font-size: clamp(1rem, 5vw, 1.7rem);
      font-weight: 800;
      font-family: inherit;
      letter-spacing: 2px;
      color: #2c1a04;
      cursor: pointer;
      transition: all 0.08s linear;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: none;
    }

    #spinButton:active {
      transform: translate(-50%, -50%) scale(0.96);
    }

    #spinButton:disabled {
      opacity: 0.6;
      transform: translate(-50%, -50%) scale(0.98);
      pointer-events: none;
    }

    @keyframes flatPulse {
      0% { border-color: #b47c10; background: #f5c542; }
      50% { border-color: #ffdf80; background: #ffe0a3; }
      100% { border-color: #b47c10; background: #f5c542; }
    }

    #spinButton.pulse-glow {
      animation: flatPulse 1.2s infinite;
    }

    .controls {
      margin-top: 12px;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .action-buttons {
      display: flex;
      gap: clamp(12px, 4vw, 28px);
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
      width: 100%;
      padding: 0 12px;
    }

    .action-buttons button {
      background: #2a2e2a;
      border: 1px solid #5a5e55;
      border-radius: 60px;
      padding: 12px 22px;
      font-size: clamp(0.85rem, 3.5vw, 1rem);
      font-weight: 600;
      color: #f5e7c8;
      cursor: pointer;
      transition: 0.1s linear;
      letter-spacing: 0.5px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex: 0 1 auto;
      box-shadow: none;
    }

    .action-buttons button:active {
      transform: translateY(2px);
    }

    #checkButton { background: #e67e22; border-color: #b45f1b; color: #fff; }
    #claimButton { background: #1f5068; border-color: #0f2c3b; }
    #reprintButton { background: #6c3483; border-color: #4a235a; }

    .coin-token {
      position: fixed;
      width: 48px;
      height: 48px;
      background: radial-gradient(circle at 35% 35%, #FFD966, #D4AF37);
      border-radius: 50%;
      border: 2px solid #f1c40f;
      z-index: 1000;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: bold;
      color: #b8860b;
      transition: transform 0.75s cubic-bezier(0.2, 1.1, 0.4, 1.2);
      will-change: transform;
      box-shadow: none;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      backdrop-filter: blur(4px);
    }
    .modal-container {
      background: #1e1f1c;
      border: 1px solid #d4af37;
      border-radius: 32px;
      max-width: 420px;
      width: 85%;
      padding: 28px 24px;
      box-shadow: none;
    }
    .modal-title { 
      font-size: 1.6rem; 
      font-weight: 600; 
      margin-bottom: 20px; 
      color: #FFD966; 
      text-align: center;
    }
    .modal-input, .modal-select { 
      width: 100%; 
      padding: 14px 18px; 
      font-size: 1rem; 
      background: #2c2e2a; 
      color: #f0e6d2; 
      border: 1px solid #5e5b4a; 
      border-radius: 48px; 
      margin-bottom: 24px; 
      outline: none; 
    }
    .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; }
    .modal-btn { padding: 12px 24px; border-radius: 40px; font-size: 1rem; font-weight: 600; cursor: pointer; border: none; }
    .modal-btn-primary { background: #d4af37; color: #1e1a0c; font-weight: bold; }
    .modal-btn-secondary { background: #3a3c37; color: #f0e6d2; }
    .modal-message {
      font-size: 1.1rem;
      margin: 20px 0;
      white-space: pre-wrap;
      text-align: center;
      color: #FFE484;
    }
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      flex-direction: column;
    }
    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 6px solid #403a2b;
      border-top: 6px solid #d4af37;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loading-text { color: #FFD966; font-size: 1.2rem; font-weight: 500; }
    
    #result {
      text-align: center;
      font-size: clamp(1rem, 4vw, 1.3rem);
      margin-top: 20px;
      font-weight: 700;
      color: #FFE484;
      background: rgba(0,0,0,0.4);
      padding: 10px 18px;
      border-radius: 60px;
      display: inline-block;
      width: auto;
      max-width: 90%;
    }

    @media (max-width: 600px) {
      .wheel-container { padding: 12px 8px 20px 8px; }
      .action-buttons button { padding: 10px 16px; }
      canvas { max-width: 94vw; }
    }
  </style>
</head>
<body>
<div class="wheel-container">
  <h1>✦ UL LUCKY SPIN ✦</h1>
  <div class="wheel-wrapper">
    <canvas id="wheelCanvas" width="700" height="700"></canvas>
    <button id="spinButton">SPIN</button>
  </div>
  <div id="coinToken" class="coin-token" style="display: none;"></div>
  <div class="controls">
    <div class="action-buttons">
      <button id="checkButton">🔍 CHECK TICKET</button>
      <button id="claimButton">💰 CLAIM PRIZE</button>
      <button id="reprintButton">🖨️ REPRINT</button>
    </div>
  </div>
  <div id="result"></div>
</div>

<!-- MODALS -->
<div id="inputModal" class="modal-overlay"><div class="modal-container"><div class="modal-title" id="inputModalTitle">Enter receipt number</div><input type="text" id="inputModalField" class="modal-input" placeholder="Receipt number"><div class="modal-buttons"><button class="modal-btn modal-btn-secondary" id="inputModalCancel">Cancel</button><button class="modal-btn modal-btn-primary" id="inputModalOk">OK</button></div></div></div>
<div id="selectModal" class="modal-overlay"><div class="modal-container"><div class="modal-title" id="selectModalTitle">Select prize</div><select id="selectModalField" class="modal-select"></select><div class="modal-buttons"><button class="modal-btn modal-btn-secondary" id="selectModalCancel">Cancel</button><button class="modal-btn modal-btn-primary" id="selectModalOk">OK</button></div></div></div>
<div id="alertModal" class="modal-overlay"><div class="modal-container"><div class="modal-title" id="alertModalTitle">Message</div><div class="modal-message" id="alertModalMessage"></div><div class="modal-buttons" style="justify-content: center;"><button class="modal-btn modal-btn-primary" id="alertModalOk">OK</button></div></div></div>
<div id="loadingOverlay" class="loading-overlay"><div class="loading-spinner"></div><div class="loading-text" id="loadingMessage">Loading...</div></div>

<script>
  // ---------- CONFIGURATION ----------
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbynUwttCsy9qEtWNB_jZ2X6P5CPfL8B6ESnchm02SUi58A-G9-SYWzykfynC-L1HPVyVQ/exec"; 

  // New prize list with discount values (matching the requested list)
  const prizes = [
    { label: "FREE LA PREVE 100ML RM 210", weight: 0, discountValue: 210 },
    { label: "TRAVEL PERFUME BUY 1 FREE 1", weight: 1, discountValue: 75 },
    { label: "FREE 100ML SIG EDP RM 180", weight: 0, discountValue: 180 },
    { label: "FREE CAR AROMATIC RM 38", weight: 5, discountValue: 38 },
    { label: "FREE 200ML REED DIFFUSER RM 89", weight: 0, discountValue: 89 },
    { label: "100ML SIG EDP BUY 1 FREE 1", weight: 2, discountValue: 180 },
    { label: "FREE 500ML BODY WASH RM 67", weight: 0, discountValue: 67 },
    { label: "FREE 15ML TRAVEL PERFUME RM 75", weight: 1, discountValue: 75 },
    { label: "FREE 300ML LOTION RM 109", weight: 0, discountValue: 109 },
    { label: "100ML EDP BUY 1 FREE 1 15ML PERFUME", weight: 4, discountValue: 75 },
    { label: "FREE 100ML ROOM SPRAY RM 89", weight: 0, discountValue: 89 },
    { label: "NO WIN", weight: 0, discountValue: 0 },
    { label: "FREE 100ML PILLOW MIST RM 75", weight: 1, discountValue: 75 },
    { label: "100ML SIG EDP BUY 2 FREE 2", weight: 3, discountValue: 360 },
    { label: "FREE HUMIDIFIER MACHINE RM 249", weight: 0, discountValue: 249 },
    // Additional duplicates of CAR AROMATIC to meet weight distribution (weight 5 total)
    { label: "FREE CAR AROMATIC RM 38", weight: 5, discountValue: 38 },
    { label: "FREE CAR AROMATIC RM 38", weight: 5, discountValue: 38 },
    { label: "FREE CAR AROMATIC RM 38", weight: 5, discountValue: 38 },
    { label: "FREE CAR AROMATIC RM 38", weight: 5, discountValue: 38 }
  ];

  const uniquePrizes = [...new Set(prizes.map(p => p.label))].sort();
  const colorPalette = ["#D32F2F","#F9A825","#2E7D32","#0288D1","#6A1B9A","#C2185B","#FFB300","#00796B","#AD1457","#455A64"];

  const canvas = document.getElementById('wheelCanvas');
  const ctx = canvas.getContext('2d');
  const spinBtn = document.getElementById('spinButton');
  const resultDiv = document.getElementById('result');

  let spinning = false, currentRotation = 0, animationFrame = null, spinStartTime = null;
  const spinDuration = 13000;
  let spinStartRotation = 0, spinTargetRotation = 0;
  let storedReceiptNumber = null;
  let customerId = null;
  const TWO_PI = 2 * Math.PI;
  function normalizeAngle(angle) { return ((angle % TWO_PI) + TWO_PI) % TWO_PI; }

  function drawWheel() {
    const w = canvas.width, h = canvas.height;
    const centerX = w/2, centerY = h/2;
    const radius = Math.min(centerX, centerY) - 18;
    ctx.clearRect(0, 0, w, h);
    if (prizes.length === 0) {
      ctx.font='bold 28px "Segoe UI"'; ctx.fillStyle='#FFD966';
      ctx.fillText('Add prizes', centerX, centerY);
      return;
    }
    const segmentAngle = TWO_PI / prizes.length;
    
    let startAngle = currentRotation;
    for (let i = 0; i < prizes.length; i++) {
      const endAngle = startAngle + segmentAngle;
      ctx.beginPath();
      ctx.moveTo(centerX, centerY);
      ctx.arc(centerX, centerY, radius-2, startAngle, endAngle);
      ctx.closePath();
      
      const baseColor = colorPalette[i % colorPalette.length];
      ctx.fillStyle = baseColor;
      ctx.fill();
      ctx.strokeStyle = '#1e1a0c';
      ctx.lineWidth = 2;
      ctx.stroke();
      
      startAngle += segmentAngle;
    }
    
    ctx.beginPath();
    ctx.arc(centerX, centerY, radius-3, 0, TWO_PI);
    ctx.strokeStyle = '#3e3522';
    ctx.lineWidth = 3;
    ctx.stroke();
    
    startAngle = currentRotation;
    for (let i = 0; i < prizes.length; i++) {
      const prize = prizes[i];
      const midAngle = startAngle + segmentAngle/2;
      ctx.save();
      ctx.translate(centerX, centerY);
      ctx.rotate(midAngle);
      const textRadius = radius * 0.62;
      const chordLength = 2 * textRadius * Math.sin(segmentAngle/2) * 0.92;
      let fontSize = 28;
      const minFontSize = 16;
      ctx.font = `bold ${fontSize}px "Poppins", "Segoe UI", system-ui`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      while (fontSize > minFontSize && ctx.measureText(prize.label).width > chordLength) {
        fontSize--;
        ctx.font = `bold ${fontSize}px "Poppins", "Segoe UI", system-ui`;
      }
      ctx.fillStyle = '#FEF9E6';
      ctx.fillText(prize.label, textRadius, 4);
      ctx.fillStyle = '#000000';
      ctx.fillText(prize.label, textRadius-1, 3);
      ctx.fillStyle = '#FFF9E0';
      ctx.fillText(prize.label, textRadius, 3);
      ctx.restore();
      startAngle += segmentAngle;
    }
    
    ctx.beginPath();
    ctx.arc(centerX, centerY, 32, 0, TWO_PI);
    ctx.fillStyle = '#EAB522';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(centerX, centerY, 25, 0, TWO_PI);
    ctx.fillStyle = '#F5C542';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(centerX, centerY, 17, 0, TWO_PI);
    ctx.fillStyle = '#FFDC7A';
    ctx.fill();
    ctx.fillStyle = '#b37b2e';
    ctx.font = 'bold 24px "Segoe UI"';
    ctx.fillText("✨", centerX-8, centerY+10);
    ctx.fillText("✨", centerX+6, centerY-6);
    
    ctx.beginPath();
    ctx.arc(centerX, centerY, radius, 0, TWO_PI);
    ctx.strokeStyle = '#C8A84E';
    ctx.lineWidth = 5;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(centerX, centerY, radius-6, 0, TWO_PI);
    ctx.strokeStyle = '#FFE084';
    ctx.lineWidth = 1.8;
    ctx.stroke();
    
    drawFlatPointer(centerX, centerY, radius);
  }
  
  function drawFlatPointer(cx, cy, wheelRadius) {
    const tipY = cy - wheelRadius + 12;
    const baseY = tipY - 32;
    const arrowWidth = 40;
    const halfW = arrowWidth / 2;
    const leftX = cx - halfW;
    const rightX = cx + halfW;
    
    ctx.beginPath();
    ctx.moveTo(leftX, baseY);
    ctx.lineTo(cx, tipY);
    ctx.lineTo(rightX, baseY);
    ctx.closePath();
    ctx.fillStyle = '#D32F2F';
    ctx.fill();
    ctx.strokeStyle = '#8B0000';
    ctx.lineWidth = 2;
    ctx.stroke();
    
    ctx.beginPath();
    ctx.arc(cx, baseY + 8, 5, 0, TWO_PI);
    ctx.fillStyle = '#DDAA33';
    ctx.fill();
    ctx.fillStyle = '#5a3e0c';
    ctx.font = "bold 14px monospace";
    ctx.fillText("▼", cx-4, baseY+11);
  }
  
  // ---------- MODAL HELPERS ----------
  function showInputModal(title,placeholder='') { return new Promise((resolve)=>{ const overlay=document.getElementById('inputModal'), titleEl=document.getElementById('inputModalTitle'), field=document.getElementById('inputModalField'), okBtn=document.getElementById('inputModalOk'), cancelBtn=document.getElementById('inputModalCancel'); titleEl.textContent=title; field.placeholder=placeholder; field.value=''; overlay.style.display='flex'; field.focus(); const onOk=()=>{cleanup();resolve(field.value.trim());}; const onCancel=()=>{cleanup();resolve(null);}; const onKeyDown=(e)=>{if(e.key==='Enter')onOk();if(e.key==='Escape')onCancel();}; const cleanup=()=>{overlay.style.display='none'; okBtn.removeEventListener('click',onOk); cancelBtn.removeEventListener('click',onCancel); field.removeEventListener('keydown',onKeyDown);}; okBtn.addEventListener('click',onOk); cancelBtn.addEventListener('click',onCancel); field.addEventListener('keydown',onKeyDown); }); }
  function showSelectModal(title,options) { return new Promise((resolve)=>{ const overlay=document.getElementById('selectModal'), titleEl=document.getElementById('selectModalTitle'), select=document.getElementById('selectModalField'), okBtn=document.getElementById('selectModalOk'), cancelBtn=document.getElementById('selectModalCancel'); titleEl.textContent=title; select.innerHTML=''; options.forEach(opt=>{const option=document.createElement('option'); option.value=opt; option.textContent=opt; select.appendChild(option);}); overlay.style.display='flex'; const onOk=()=>{cleanup();resolve(select.value);}; const onCancel=()=>{cleanup();resolve(null);}; const onKeyDown=(e)=>{if(e.key==='Enter')onOk();if(e.key==='Escape')onCancel();}; const cleanup=()=>{overlay.style.display='none'; okBtn.removeEventListener('click',onOk); cancelBtn.removeEventListener('click',onCancel); select.removeEventListener('keydown',onKeyDown);}; okBtn.addEventListener('click',onOk); cancelBtn.addEventListener('click',onCancel); select.addEventListener('keydown',onKeyDown); }); }
  function showAlertModal(title,message) { return new Promise((resolve)=>{ const overlay=document.getElementById('alertModal'), titleEl=document.getElementById('alertModalTitle'), msgEl=document.getElementById('alertModalMessage'), okBtn=document.getElementById('alertModalOk'); titleEl.textContent=title; msgEl.textContent=message; overlay.style.display='flex'; const onOk=()=>{overlay.style.display='none'; okBtn.removeEventListener('click',onOk); resolve();}; okBtn.addEventListener('click',onOk); }); }
  const loadingOverlay=document.getElementById('loadingOverlay'), loadingMessage=document.getElementById('loadingMessage');
  function showLoading(msg='Loading...'){ loadingMessage.textContent=msg; loadingOverlay.style.display='flex'; }
  function hideLoading(){ loadingOverlay.style.display='none'; }
  
  // ---------- BACKEND API ----------
  async function fetchReceiptData(receiptNumber){ showLoading('Checking receipt...'); try{ const url=`${APPS_SCRIPT_URL}?action=get&receipt=${encodeURIComponent(receiptNumber)}`; const resp=await fetch(url); const res=await resp.json(); return res.success?res.data:null; }finally{ hideLoading(); } }
  
  async function saveSpinResult(receiptNumber, prize, discountValue, customerId = null){ 
    showLoading('Recording your win...'); 
    try{ 
      const fd = new URLSearchParams(); 
      fd.append('action','save'); 
      fd.append('receipt', receiptNumber); 
      fd.append('prize', prize);
      fd.append('discount', discountValue.toString());   // NEW: send discount value
      if (customerId) fd.append('customer_id', customerId);
      const resp = await fetch(APPS_SCRIPT_URL, { method:'POST', body: fd }); 
      const res = await resp.json(); 
      if (!res.success) throw new Error(res.error || 'Server error');
      return true; 
    } catch(err) {
      console.error('Save error:', err);
      await showAlertModal('Save Failed', `Could not save: ${err.message}\nPlease screenshot your win.`);
      return false;
    } finally{ hideLoading(); } 
  }
  
  async function claimReceipt(receiptNumber,value){ showLoading('Processing claim...'); try{ const fd=new URLSearchParams(); fd.append('action','claim'); fd.append('receipt',receiptNumber); fd.append('value',value); const resp=await fetch(APPS_SCRIPT_URL,{method:'POST',body:fd}); const res=await resp.json(); return res.success; }finally{ hideLoading(); } }
  
  // date helpers unchanged ...
  function parseSpinDate(timestamp){ if(!timestamp)return null; let d=new Date(timestamp); if(isNaN(d.getTime())){ const parts=timestamp.split(/[-/]/); if(parts.length===3){ let y,m,day; if(parts[0].length===4){ y=parseInt(parts[0]); m=parseInt(parts[1])-1; day=parseInt(parts[2]); }else{ day=parseInt(parts[0]); m=parseInt(parts[1])-1; y=parseInt(parts[2]); } d=new Date(y,m,day); }else return null; } if(isNaN(d.getTime()))return null; return new Date(d.getFullYear(),d.getMonth(),d.getDate()); }
  function getExpiryInfo(timestamp){ const spinDate=parseSpinDate(timestamp); if(!spinDate)return{valid:false,message:'Invalid date format'}; const today=new Date(); const currentDay=new Date(today.getFullYear(),today.getMonth(),today.getDate()); const diffDays=Math.floor((currentDay-spinDate)/(1000*60*60*24)); const expiryDate=new Date(spinDate.getTime()+30*24*60*60*1000); return{valid:true,spinDate,diffDays,expired:diffDays>30,expiryDate}; }
  function closePage() { window.close(); setTimeout(()=>{ showAlertModal('Thank You', 'The page can now be closed.'); }, 500); }
  
  // ---------- AUDIO ----------
  let audioContext=null;
  function initAudio(){ if(!audioContext) audioContext=new (window.AudioContext||window.webkitAudioContext)(); }
  function playCoinSound(){ try{ initAudio(); const now=audioContext.currentTime; const osc1=audioContext.createOscillator(); const gain1=audioContext.createGain(); osc1.type='sine'; osc1.frequency.value=1200; gain1.gain.setValueAtTime(0.3,now); gain1.gain.exponentialRampToValueAtTime(0.01,now+0.15); osc1.connect(gain1); gain1.connect(audioContext.destination); osc1.start(now); osc1.stop(now+0.15); const osc2=audioContext.createOscillator(); const gain2=audioContext.createGain(); osc2.type='sine'; osc2.frequency.value=1800; gain2.gain.setValueAtTime(0.15,now); gain2.gain.exponentialRampToValueAtTime(0.005,now+0.1); osc2.connect(gain2); gain2.connect(audioContext.destination); osc2.start(now); osc2.stop(now+0.1); }catch(e){console.log('Audio not supported');} }
  function playSpinSound(){ try{ initAudio(); const now=audioContext.currentTime; const bufferSize=4096; const noiseBuffer=audioContext.createBuffer(1,bufferSize,audioContext.sampleRate); const output=noiseBuffer.getChannelData(0); for(let i=0;i<bufferSize;i++) output[i]=Math.random()*2-1; const noise=audioContext.createBufferSource(); noise.buffer=noiseBuffer; const filter=audioContext.createBiquadFilter(); filter.type='bandpass'; filter.frequency.setValueAtTime(800,now); filter.frequency.exponentialRampToValueAtTime(200,now+0.5); filter.Q.value=5; const gain=audioContext.createGain(); gain.gain.setValueAtTime(0.2,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.5); noise.connect(filter); filter.connect(gain); gain.connect(audioContext.destination); noise.start(now); noise.stop(now+0.5); const osc=audioContext.createOscillator(); const oscGain=audioContext.createGain(); osc.type='sawtooth'; osc.frequency.setValueAtTime(150,now); osc.frequency.exponentialRampToValueAtTime(60,now+0.4); oscGain.gain.setValueAtTime(0.1,now); oscGain.gain.exponentialRampToValueAtTime(0.001,now+0.4); osc.connect(oscGain); oscGain.connect(audioContext.destination); osc.start(now); osc.stop(now+0.4); }catch(e){console.log('Audio not supported');} }
  function animateCoinToButton(){ return new Promise((resolve)=>{ const coin=document.getElementById('coinToken'); const spinBtnRect=spinBtn.getBoundingClientRect(); const targetX=spinBtnRect.left+spinBtnRect.width/2; const targetY=spinBtnRect.top+spinBtnRect.height/2; const wheelRect=canvas.getBoundingClientRect(); const startX=wheelRect.right-30; const startY=wheelRect.bottom-30; coin.style.display='flex'; coin.style.left=startX+'px'; coin.style.top=startY+'px'; coin.style.transform='translate(0,0) scale(1.4)'; coin.offsetHeight; const dx=targetX-startX; const dy=targetY-startY; coin.style.transform=`translate(${dx}px, ${dy}px) scale(1)`; const onTransitionEnd=()=>{ coin.style.display='none'; coin.removeEventListener('transitionend',onTransitionEnd); playCoinSound(); resolve(); }; coin.addEventListener('transitionend',onTransitionEnd,{once:true}); }); }
  
  // ---------- SPIN LOGIC ----------
  async function spinWheel(){
    if(spinning) return;
    if(storedReceiptNumber===null){
      const receiptNumber=await showInputModal('Enter receipt number','Receipt number');
      if(receiptNumber===null||receiptNumber===''){ if(receiptNumber!==null) await showAlertModal('Error','Receipt number cannot be empty.'); return; }
      try{
        const existing=await fetchReceiptData(receiptNumber);
        if(existing!==null){ await showAlertModal('Already Used',`Receipt ${receiptNumber} already won: ${existing.prize}${existing.claimed?' (claimed)':' (not claimed)'}. Cannot use again.`); return; }
      }catch(error){ await showAlertModal('Error','Error checking receipt. Please try again.'); console.error(error); return; }
      storedReceiptNumber=receiptNumber; resultDiv.innerText=`Valid! Token added -- Spin the wheel, Good luck...`;
      await animateCoinToButton(); spinBtn.classList.add('pulse-glow'); return;
    }
    const receiptNumber=storedReceiptNumber; storedReceiptNumber=null; spinBtn.classList.remove('pulse-glow'); playSpinSound();
    if(prizes.length===0){ resultDiv.innerText='Add some prizes first!'; return; }
    const totalWeight=prizes.reduce((s,p)=>s+p.weight,0);
    if(totalWeight===0){ resultDiv.innerText='All weights are zero – nothing to win!'; return; }
    let rand=Math.random()*totalWeight; let cumulative=0,selectedIndex=0;
    for(let i=0;i<prizes.length;i++){ cumulative+=prizes[i].weight; if(rand<cumulative){ selectedIndex=i; break; } }
    
    const centerX=canvas.width/2, centerY=canvas.height/2;
    const radius = Math.min(centerX,centerY)-18;
    const pointerTip = {x: centerX, y: centerY - radius + 12};
    const pointerAngle = Math.atan2(pointerTip.y - centerY, pointerTip.x - centerX);
    const normalizedPointerAngle = normalizeAngle(pointerAngle);
    const segmentAngle = TWO_PI / prizes.length;
    const randomOffset = Math.random() * segmentAngle;
    const targetAngleInWheel = selectedIndex * segmentAngle + randomOffset;
    let targetBaseRotation = normalizeAngle(normalizedPointerAngle - targetAngleInWheel);
    const extraFullTurns = 12 + Math.floor(Math.random() * 9);
    const extraAngle = extraFullTurns * TWO_PI;
    spinTargetRotation = targetBaseRotation + extraAngle; spinStartRotation = currentRotation; spinStartTime = performance.now();
    spinning=true; spinBtn.disabled=true; if(animationFrame)cancelAnimationFrame(animationFrame);
    function animateSpin(now){
      const elapsed=now-spinStartTime; let progress=Math.min(elapsed/spinDuration,1);
      const easeOutQuart=1-Math.pow(1-progress,4);
      currentRotation=normalizeAngle(spinStartRotation+(spinTargetRotation-spinStartRotation)*easeOutQuart);
      drawWheel();
      if(progress<1){ animationFrame=requestAnimationFrame(animateSpin); }
      else{
        const wheelAngleAtPointer=normalizeAngle(normalizedPointerAngle-currentRotation);
        const segmentIndex=Math.floor(wheelAngleAtPointer/segmentAngle);
        const actualIndex=Math.min(segmentIndex,prizes.length-1);
        const wonPrize=prizes[actualIndex];
        spinning=false; spinBtn.disabled=false; resultDiv.innerText=`🎉 you won: ${wonPrize.label}`;
        // Save with discount value
        saveSpinResult(receiptNumber, wonPrize.label, wonPrize.discountValue, customerId).then(saved => {
          if (saved) {
            showAlertModal('Congratulations!', `You won: ${wonPrize.label}\nWORTH: RM ${wonPrize.discountValue}\nYour prize has been recorded. Thank you!`).then(() => closePage());
          } else {
            showAlertModal('Attention', `You won ${wonPrize.label}, but we could not record it automatically. Please contact the store with your receipt number.`).then(() => closePage());
          }
        });
        animationFrame=null;
      }
    }
    animationFrame=requestAnimationFrame(animateSpin);
  }
  spinBtn.addEventListener('click',spinWheel); drawWheel();

  // BUTTON HANDLERS (check, claim, reprint – unchanged logic)
  document.getElementById('checkButton').addEventListener('click',async()=>{
    const receiptNumber=await showInputModal('Check Lucky Draw','Receipt number');
    if(!receiptNumber){ if(receiptNumber!==null) await showAlertModal('Error','Receipt number cannot be empty.'); return; }
    try{
      const data=await fetchReceiptData(receiptNumber);
      if(!data){ await showAlertModal('Not Found',`Receipt ${receiptNumber} not found in records.`); return; }
      let statusLine='';
      if(data.claimed) statusLine=`Claimed (value: RM ${data.value||'N/A'})`;
      else{ const expiry=getExpiryInfo(data.timestamp); if(!expiry.valid) statusLine=`Not claimed – ${expiry.message}`; else if(expiry.expired) statusLine=`Expired on ${expiry.expiryDate.toLocaleDateString()}`; else statusLine=`Valid (expires on ${expiry.expiryDate.toLocaleDateString()})`; }
      await showAlertModal('Receipt Info',`Receipt: ${receiptNumber}\nPrize: ${data.prize}\nDiscount Value: RM ${data.discount_value || 'N/A'}\nStatus: ${statusLine}`);
    }catch(error){ await showAlertModal('Error','Error checking receipt.'); console.error(error); }
  });
  document.getElementById('claimButton').addEventListener('click',async()=>{
    const receiptNumber=await showInputModal('Claim Receipt','Receipt number');
    if(!receiptNumber){ if(receiptNumber!==null) await showAlertModal('Error','Receipt number cannot be empty.'); return; }
    try{
      const data=await fetchReceiptData(receiptNumber);
      if(!data){
        const prize=await showSelectModal('Select prize won',uniquePrizes); if(prize===null) return;
        const value=await showInputModal('Enter NEW receipt value (RM)','RM amount'); if(value===null||value===''){ if(value!==null) await showAlertModal('Error','Value cannot be empty.'); return; }
        // For manual entry, discount value is 0 by default (or ask user)
        const saved=await saveSpinResult(receiptNumber,prize,0, customerId); if(!saved){ await showAlertModal('Error','Failed to save record.'); return; }
        const claimed=await claimReceipt(receiptNumber,value);
        if(claimed) await showAlertModal('Success',`Receipt ${receiptNumber} claimed successfully for prize ${prize} with value RM ${value}.`);
        else await showAlertModal('Error','Claim failed after saving record.');
        return;
      }
      if(data.claimed){ await showAlertModal('Already Claimed',`Receipt ${receiptNumber} already claimed with prize: ${data.prize} (value: RM ${data.value||'N/A'}).`); return; }
      const expiry=getExpiryInfo(data.timestamp);
      if(!expiry.valid||expiry.expired){ await showAlertModal('Expired',`This prize expired on ${expiry.expiryDate?.toLocaleDateString()||'unknown date'}. Cannot claim.`); return; }
      const value=await showInputModal(`Enter NEW receipt value (RM) for prize ${data.prize}`,'RM amount');
      if(value===null||value===''){ if(value!==null) await showAlertModal('Error','Value cannot be empty.'); return; }
      const success=await claimReceipt(receiptNumber,value);
      if(success) await showAlertModal('Success',`Receipt ${receiptNumber} claimed successfully for prize ${data.prize} with value RM ${value}.`);
      else await showAlertModal('Error','Claim failed.');
    }catch(error){ await showAlertModal('Error','Error claiming receipt.'); console.error(error); }
  });
  document.getElementById('reprintButton').addEventListener('click',async()=>{
    const receiptNumber=await showInputModal('Reprint Ticket','Enter receipt number');
    if(!receiptNumber){ if(receiptNumber!==null) await showAlertModal('Error','Receipt number cannot be empty.'); return; }
    try{
      const data=await fetchReceiptData(receiptNumber);
      if(!data){ await showAlertModal('Not Found',`Receipt ${receiptNumber} not found. Cannot reprint.`); return; }
      await showAlertModal('Reprint not available', 'Printer connection is not enabled in this version.');
    }catch(err){ console.error(err); await showAlertModal('Error','Could not reprint ticket.'); }
  });

  // URL receipt + customer_id detection
  (async function(){
    const urlParams = new URLSearchParams(window.location.search);
    const receiptFromUrl = urlParams.get('receipt');
    const customerIdFromUrl = urlParams.get('customer_id');
    if (customerIdFromUrl) { customerId = customerIdFromUrl; console.log('Customer ID loaded:', customerId); }
    if(receiptFromUrl){
      storedReceiptNumber=receiptFromUrl;
      try{
        const existing=await fetchReceiptData(receiptFromUrl);
        if(existing!==null){
          await showAlertModal('Already Used',`Receipt ${receiptFromUrl} already won: ${existing.prize}${existing.claimed?' (claimed)':' (not claimed)'}. Cannot use again.`);
          storedReceiptNumber=null;
          resultDiv.innerText='This receipt has already been used.';
        }else{
          resultDiv.innerText=`Receipt ${receiptFromUrl} loaded. Click SPIN to try your luck!`;
          await animateCoinToButton();
          spinBtn.classList.add('pulse-glow');
        }
      }catch(error){ console.error('Error checking receipt from URL:',error); resultDiv.innerText='Error validating receipt. Please try manually.'; storedReceiptNumber=null; }
    }
  })();
</script>
