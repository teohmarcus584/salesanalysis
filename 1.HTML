<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lucky Draw</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      width: 100%;
      background: white;
      border-radius: 28px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      text-align: center;
    }
    h1 {
      font-size: 2.5rem;
      color: #f59e0b;
      margin-bottom: 20px;
    }
    .receipt-id {
      background: #f1f5f9;
      padding: 12px 20px;
      border-radius: 60px;
      font-family: monospace;
      font-size: 1.2rem;
      margin: 20px 0;
      word-break: break-all;
    }
    button {
      background: #f59e0b;
      border: none;
      padding: 14px 40px;
      border-radius: 60px;
      color: white;
      font-size: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }
    button:hover {
      background: #d97706;
      transform: scale(1.02);
    }
    button:active {
      transform: scale(0.98);
    }
    .prize {
      margin-top: 30px;
      font-size: 1.5rem;
      font-weight: bold;
      color: #2c7a4b;
      min-height: 80px;
      padding: 20px;
      background: #f0fdf4;
      border-radius: 20px;
      display: none;
    }
    .prize.show {
      display: block;
    }
    .error {
      color: #dc2626;
      margin-top: 10px;
      font-size: 0.9rem;
    }
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
      margin-left: 10px;
      vertical-align: middle;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎉 Lucky Draw 🎉</h1>
    <p>Your receipt number:</p>
    <div class="receipt-id" id="receiptId">—</div>
    <button id="spinBtn">🎁 Spin the Wheel</button>
    <div id="result" class="prize"></div>
  </div>

  <script>
    // Function to get URL parameters
    function getQueryParam(param) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(param);
    }

    // Get the receipt number from the URL
    const receipt = getQueryParam('receipt');
    const receiptElement = document.getElementById('receiptId');
    const spinBtn = document.getElementById('spinBtn');
    const resultDiv = document.getElementById('result');

    // Display receipt number
    if (receipt) {
      receiptElement.textContent = receipt;
      console.log('Receipt number received:', receipt);
      // You can store it for later use if needed
      localStorage.setItem('lastReceipt', receipt);
    } else {
      receiptElement.textContent = 'No receipt number found';
      receiptElement.style.background = '#fee2e2';
    }

    // Prizes list (you can customize)
    const prizes = [
      { name: 'RM 10 Voucher', chance: 15 },
      { name: 'RM 50 Voucher', chance: 5 },
      { name: 'Free Coffee', chance: 20 },
      { name: '5% Off Next Purchase', chance: 25 },
      { name: 'Try Again', chance: 35 }
    ];

    // Weighted random selection
    function getRandomPrize() {
      const totalWeight = prizes.reduce((sum, p) => sum + p.chance, 0);
      let random = Math.random() * totalWeight;
      for (let prize of prizes) {
        if (random < prize.chance) return prize.name;
        random -= prize.chance;
      }
      return 'Try Again';
    }

    // Spin animation
    async function spin() {
      spinBtn.disabled = true;
      spinBtn.innerHTML = 'Spinning <span class="spinner"></span>';
      resultDiv.classList.remove('show');
      resultDiv.innerHTML = '';

      // Simulate a spinning effect (optional)
      await new Promise(resolve => setTimeout(resolve, 500));

      const prize = getRandomPrize();
      resultDiv.innerHTML = `🎉 You won: ${prize} 🎉`;
      resultDiv.classList.add('show');

      spinBtn.disabled = false;
      spinBtn.innerHTML = '🎁 Spin the Wheel';

      // Optional: Send winning result to a server or log it
      console.log(`Receipt ${receipt} won: ${prize}`);
    }

    spinBtn.addEventListener('click', spin);
  </script>
</body>
</html>
